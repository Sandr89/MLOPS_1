stages:
  prepare:
    cmd: python src/prepare.py data/raw/train.csv data/prepared
    deps:
      - data/raw/train.csv
      - src/prepare.py
      - src/preprocess.py
    outs:
      - data/prepared

  train:
    cmd: python src/train.py data/prepared data/models
    deps:
      - data/prepared
      - src/train.py
    outs:
      - data/models

  optimize:
    cmd: python src/optimize.py
    deps:
      - data/prepared
      - src/optimize.py
      - config/config.yaml
      - config/model/random_forest.yaml
      - config/model/logistic_regression.yaml
      - config/hpo/optuna.yaml
      - config/hpo/random.yaml
    outs:
      - models
      - reports
