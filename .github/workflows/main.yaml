name: Lab 5 CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-airflow.txt

      - name: Lint Python code
        run: python -m flake8 src tests dags --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check formatting
        run: python -m black src tests dags --check

      - name: Run DAG integrity tests
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/.airflow
        run: python -m pytest tests/test_dag.py -q

      - name: Build Docker image
        run: docker build -t laba1-v2-airflow-mlops .
